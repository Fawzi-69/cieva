name: Deploy to GitHub Pages

# Pages est configuré en mode « deploy from branch » (gh-pages) sur ce repo :
# on construit le site statique et on pousse `out/` sur gh-pages, le
# déploiement Pages natif prend le relais.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Le site est servi sous https://<user>.github.io/cieva → basePath /cieva
      - run: BASE_PATH=/cieva npm run build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
